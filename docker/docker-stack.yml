version: "3.9"

services:

app:
image: sigmon_app:latest

ports:
  - "5000:5000"

environment:
  MONGO_URI: mongodb://mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0
  DATABASE_NAME: sigmon
  SECRET_KEY: sigmon_ufpi_2026

networks:
  - sigmon_network

deploy:
  replicas: 2

  restart_policy:
    condition: on-failure

mongo1:
image: mongo:8.0

command:
  - --replSet
  - rs0
  - --bind_ip_all

volumes:
  - mongo1_data:/data/db

networks:
  - sigmon_network

deploy:
  placement:
    constraints:
      - node.role == manager

mongo2:
image: mongo:8.0

command:
  - --replSet
  - rs0
  - --bind_ip_all

volumes:
  - mongo2_data:/data/db

networks:
  - sigmon_network

mongo3:
image: mongo:8.0

command:
  - --replSet
  - rs0
  - --bind_ip_all

volumes:
  - mongo3_data:/data/db

networks:
  - sigmon_network

networks:
sigmon_network:
driver: overlay

volumes:
mongo1_data:
mongo2_data:
mongo3_data:
