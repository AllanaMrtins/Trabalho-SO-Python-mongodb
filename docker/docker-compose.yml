version: "3.9"

services:

  app:
    image: sigmon_app:latest
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0
      DATABASE_NAME: sigmon
      SECRET_KEY: sigmon_ufpi_2026
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    networks:
      - sigmon_network

  mongo1:
    image: mongo:8.0
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db
    networks:
      - sigmon_network

  mongo2:
    image: mongo:8.0
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongo2_data:/data/db
    networks:
      - sigmon_network

  mongo3:
    image: mongo:8.0
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27019:27017"
    volumes:
      - mongo3_data:/data/db
    networks:
      - sigmon_network

networks:
  sigmon_network:
    driver: overlay

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data: