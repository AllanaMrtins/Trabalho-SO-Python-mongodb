{% extends "base.html" %}

{% block content %}

<h2>👨‍🎓 Alunos</h2>

<div class="card">
    <form action="/alunos-page" method="POST">
        <input type="text" name="nome" placeholder="Nome do aluno" required>
        <input type="email" name="email" placeholder="E-mail" required>
        <input type="text" name="curso" placeholder="Curso" required>
        <input type="number" name="periodo" placeholder="Período (Ex: 3)" required>
        <input type="text" name="disciplinas" placeholder="Disciplinas (Ex: SO, Redes)" required>
        
        <button type="submit">Cadastrar</button>
    </form>
</div>

<div class="card">
    <h3>Lista de Alunos</h3>

    <table border="1" style="width:100%; text-align:left; border-collapse: collapse;">
        <tr>
            <th>Nome</th>
            <th>E-mail</th>
            <th>Curso</th>
            <th>Período</th>
            <th>Disciplinas</th>
        </tr>

        {% for a in alunos %}
        <tr>
            <td>{{ a.nome }}</td>
            <td>{{ a.email }}</td>
            <td>{{ a.curso }}</td>
            <td>{{ a.periodo }}</td>
            <td>{{ a.disciplinas }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

{% endblock %}
