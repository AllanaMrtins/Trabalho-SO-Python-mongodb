{% extends "base.html" %}

{% block content %}

<h2>📚 Atendimentos</h2>

<div class="card">
    <form method="POST">
        <input type="text" name="descricao" placeholder="Descrição" required>
        <button type="submit">Registrar</button>
    </form>
</div>

<div class="card">
    <h3>Histórico</h3>

    <table>
        <tr>
            <th>Descrição</th>
        </tr>

        {% for a in atendimentos %}
        <tr>
            <td>{{ a.descricao }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

{% endblock %}
