{% extends "base.html" %}

{% block content %}

<h2>🧑‍🏫 Monitores</h2>

<div class="card">
    <form method="POST">
        <input type="text" name="nome" placeholder="Nome do monitor" required>
        <button type="submit">Cadastrar</button>
    </form>
</div>

<div class="card">
    <h3>Lista de Monitores</h3>

    <table>
        <tr>
            <th>Nome</th>
        </tr>

        {% for m in monitores %}
        <tr>
            <td>{{ m.nome }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

{% endblock %}
